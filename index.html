<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>WebAR Magic Card</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      .info { position: fixed; bottom: 12px; left: 0; right: 0; text-align: center;
              color: #fff; font-family: sans-serif; font-size: 14px;
              text-shadow: 0 1px 3px #000; z-index: 999; }
    </style>
  </head>
  <body>
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      <!-- The QR-code-style Hiro marker. Print marker/hiro.png; that sheet IS the card. -->
      <a-marker preset="hiro">
        <!-- Smaller cube so it reads as a floating object, not a wall of color.
             A second wireframe box shows the edges so the 3D rotation is obvious. -->
        <a-entity position="0 0.5 0"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear"
                  animation__bob="property: position; to: 0 0.7 0; dir: alternate; loop: true; dur: 1500; easing: easeInOutSine">
          <a-box scale="0.5 0.5 0.5" material="color: #4CC3D9; metalness: 0.1; roughness: 0.6"></a-box>
          <a-box scale="0.52 0.52 0.52" material="color: #0b3d4d; wireframe: true; wireframeLinewidth: 2"></a-box>
        </a-entity>

        <!-- OPTIONAL VIDEO: drop a clip at assets/clip.mp4, then uncomment this block
             and the <a-assets> below. On iOS the video must be muted and may need a tap to start.
        <a-video src="#clip" width="1.6" height="0.9" position="0 1.4 0" rotation="-90 0 0"></a-video>
        -->
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <!-- OPTIONAL: uncomment together with the <a-video> above to enable the video plane.
    <a-assets>
      <video id="clip" src="assets/clip.mp4" preload="auto" loop muted playsinline crossorigin="anonymous"></video>
    </a-assets>
    -->

    <div class="info">Point your camera at the Hiro marker</div>
  </body>
</html>
