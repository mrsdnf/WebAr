<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>WebAR Magic Card — Jabra Sound+ App</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      .info { position: fixed; bottom: 12px; left: 0; right: 0; text-align: center;
              color: #fff; font-family: sans-serif; font-size: 14px;
              text-shadow: 0 1px 3px #000; z-index: 999; }
    </style>
  </head>
  <body>
    <a-scene embedded arjs="sourceType: webcam; patternRatio: 0.5; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      <a-assets>
        <video id="clip" src="assets/clip.mp4" preload="auto" loop autoplay muted playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <!-- Custom "Jabra Sound+ App" QR-style pattern marker. Print marker/jabra-marker.png as the card. -->
      <a-marker type="pattern" url="marker/jabra.patt">
        <!-- Video lies flat on the card (source is landscape 720x434 ~ 1.66:1). -->
        <a-video src="#clip" width="3" height="1.81" position="0 0.01 0" rotation="-90 0 0"></a-video>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
    <div class="info">Point your camera at the Jabra Sound+ card</div>

    <script>
      // Nudge mobile browsers (especially iOS) to actually start the muted video.
      window.addEventListener('load', function () {
        var v = document.querySelector('#clip');
        var kick = function () { if (v) { v.play().catch(function () {}); } };
        document.body.addEventListener('click', kick);
        var scene = document.querySelector('a-scene');
        if (scene) scene.addEventListener('markerFound', kick);
      });
    </script>
  </body>
</html>
