<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>WebAR Story — Jabra Sound Plus</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      .info { position: fixed; bottom: 12px; left: 0; right: 0; text-align: center;
              color: #fff; font-family: sans-serif; font-size: 14px;
              text-shadow: 0 1px 3px #000; z-index: 999; }
    </style>
  </head>
  <body>
    <a-scene embedded arjs="sourceType: webcam; patternRatio: 0.5; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      <a-assets>
        <video id="clip1" src="assets/clip.mp4" preload="auto" loop autoplay muted playsinline webkit-playsinline crossorigin="anonymous"></video>
        <video id="clip2" src="assets/clip.mp4" preload="auto" loop autoplay muted playsinline webkit-playsinline crossorigin="anonymous"></video>
        <video id="clip3" src="assets/clip.mp4" preload="auto" loop autoplay muted playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <!-- Marker 1: J -->
      <a-marker type="pattern" url="marker/J.patt">
        <a-video src="#clip1" width="9" height="5.43" position="0 0.01 0" rotation="-90 0 0"></a-video>
      </a-marker>

      <!-- Marker 2: S -->
      <a-marker type="pattern" url="marker/S.patt">
        <a-video src="#clip2" width="9" height="5.43" position="0 0.01 0" rotation="-90 0 0"></a-video>
      </a-marker>

      <!-- Marker 3: P -->
      <a-marker type="pattern" url="marker/P.patt">
        <a-video src="#clip3" width="9" height="5.43" position="0 0.01 0" rotation="-90 0 0"></a-video>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
    <div class="info">Scan to open, then aim at the J, S and P markers</div>

    <script>
      window.addEventListener('load', function () {
        var vids = [document.querySelector('#clip1'),
                    document.querySelector('#clip2'),
                    document.querySelector('#clip3')];
        var kick = function () { vids.forEach(function (v) { if (v) v.play().catch(function () {}); }); };
        document.body.addEventListener('click', kick);
        document.querySelectorAll('a-marker').forEach(function (m) { m.addEventListener('markerFound', kick); });
      });
    </script>
  </body>
</html>
